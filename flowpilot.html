<script src="flowpilot/core.js"></script>
<script type="text/javascript">
(function () {
    "use strict";
    // All actual logic lives in flowpilot-core.js (served via the
    // /flowpilot/core.js route in flowpilot.js), shared verbatim between
    // this sidebar panel and the detached pop-out window
    // (lib/popout/view.html) — mirroring how Node-RED 5's own Debug panel
    // shares one renderer (debug-utils.js) between its sidebar tab and its
    // pop-out. This file only wires the sidebar entry point.
    RED.plugins.registerPlugin("flowpilot", {
        type: "node-red-plugin",
        onadd: function () { FlowPilotCore.initMainWindow(); }
    });
})();
</script>

<link rel="stylesheet" href="flowpilot/core.css">
